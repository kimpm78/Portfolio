services:
  portfolio-app:
    image: oven/bun:1
    container_name: soosang-dev-portfolio
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - bun-cache:/root/.bun
      - node-modules:/app/node_modules
    command: sh -c "bun install && bun run dev --host 0.0.0.0"
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  bun-cache:
  node-modules: