    <script>
      ;(function (location) {
        if (!location.search.startsWith('?/')) {
          return
        }

        var decodedPath = location.search
          .slice(2)
          .split('&')
          .map(function (segment) {
            return segment.replace(/~and~/g, '&')
          })
          .join('?')

        window.history.replaceState(null, '', location.pathname + decodedPath + location.hash)
      })(window.location)
    </script>
  </head>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
